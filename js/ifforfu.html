<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Random Aufgabe</title>
    </head>
    <body>
        <script>
            // Aufgabe 1: Variablen erstellen
            const name = "Finn";
            const alter = 20;
            const lieblingsfarbe = "lila";

            // Aufgabe 2: Rechnen mit zwei Zahlen
            const zahl1 = 10;
            const zahl2 = 5;

            const addition = zahl1 + zahl2;
            const subtraktion = zahl1 - zahl2;
            const multiplikation = zahl1 * zahl2;
            const division = zahl1 / zahl2;

            // Ergebnisse ausgeben (Aufgaben 1 & 2)
            console.log("Name: " + name);
            console.log("Alter: " + alter);
            console.log("Lieblingsfarbe: " + lieblingsfarbe);
            console.log("---");
            console.log("Zahl 1: " + zahl1);
            console.log("Zahl 2: " + zahl2);
            console.log("Addition: " + addition);
            console.log("Subtraktion: " + subtraktion);
            console.log("Multiplikation: " + multiplikation);
            console.log("Division: " + division);

            // --- Aufgabe 3: Altersprüfung ---
            console.log("--- Aufgabe 3 ---");
            // Die vorhandene Variable 'alter' (Wert 20) wird verwendet
            if (alter >= 18) {
                console.log("Volljährig");
            } else {
                console.log("Minderjährig");
            }

            // --- Aufgabe 4: Schleifen ---
            console.log("--- Aufgabe 4 ---");

            // 1. Schleife: Zahlen 1 bis 10
            console.log("Zahlen 1 bis 10:");
            for (let i = 1; i <= 10; i++) {
                console.log(i);
            }

            // 2. Schleife: Gerade Zahlen von 2 bis 20
            console.log("Gerade Zahlen von 2 bis 20:");
            for (let i = 2; i <= 20; i += 2) {
                console.log(i);
            }
            function sageHallo() {
                console.log("Halo JavaScript");
            }
            sageHallo();
            </script>
    </body>
</html>
