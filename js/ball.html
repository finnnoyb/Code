<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing Ball Canvas</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .stat-box {
            text-align: center;
        }

        .stat-value {
            font-weight: bold;
            font-size: 1.5rem;
            color: #333;
        }

        canvas {
            background-color: #ffffff;
            border: 2px solid #333;
            border-radius: 4px;
            cursor: crosshair;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="stats">
        <div class="stat-box">
            <div>angefasst</div>
            <div id="ballCounter" class="stat-value">0</div>
        </div>
        <div class="stat-box">
            <div>daneben gefasst</div>
            <div id="missCounter" class="stat-value">0</div>
        </div>
    </div>

    <canvas id="gameCanvas" width="600" height="400"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ballCounterEl = document.getElementById('ballCounter');
        const missCounterEl = document.getElementById('missCounter');

        // Game State
        let ballClicks = 0;
        let missClicks = 0;

        // Ball Properties
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 30,
            dx: 2, // Horizontal speed
            dy: 1, // Vertical speed
            color: getRandomColor()
        };

        // Helper: Generate random color
        function getRandomColor() {
            const r = Math.floor(Math.random() * 255);
            const g = Math.floor(Math.random() * 255);
            const b = Math.floor(Math.random() * 255);
            return `rgb(${r}, ${g}, ${b})`;
        }

        // Helper: Draw the ball
        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = ball.color;
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.closePath();
        }

        // Helper: Update ball position and handle wall collisions
        function updateBall() {
            // Check right/left walls
            if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
                ball.dx = -ball.dx;
            }

            // Check top/bottom walls
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.dy = -ball.dy;
            }

            // Move ball
            ball.x += ball.dx;
            ball.y += ball.dy;
        }

        // Main Animation Loop
        function animate() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            updateBall();
            drawBall();

            requestAnimationFrame(animate);
        }

        // Handle Clicks
        canvas.addEventListener('click', (e) => {
            // Get mouse position relative to canvas
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // Calculate distance between mouse and ball center
            const dist = Math.sqrt(
                Math.pow(mouseX - ball.x, 2) + 
                Math.pow(mouseY - ball.y, 2)
            );

            if (dist < ball.radius) {
                // CLICKED THE BALL
                ballClicks++;
                ballCounterEl.textContent = ballClicks;
                
                // Reverse direction (Bounce on click)
                ball.dx = -ball.dx;
                ball.dy = -ball.dy;
                
                // Change color
                ball.color = getRandomColor();
            } else {
                // CLICKED OUTSIDE (MISS)
                missClicks++;
                missCounterEl.textContent = missClicks;
            }
        });

        // Start the game
        animate();

    </script>
</body>
</html>
